<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ILCS Assistant IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0:           #04050d;
      --bg-1:           #070a14;
      --bg-2:           #0b0f1e;
      --bg-3:           #101526;
      --bg-4:           #141c30;
      --bg-5:           #1a2338;

      --accent:         #6366f1;
      --accent-dim:     rgba(99,102,241,0.18);
      --accent-glow:    rgba(99,102,241,0.28);
      --accent-soft:    rgba(99,102,241,0.08);
      --accent2:        #38bdf8;
      --accent2-dim:    rgba(56,189,248,0.15);
      --accent3:        #a78bfa;

      --border:         rgba(99,102,241,0.1);
      --border-md:      rgba(99,102,241,0.18);
      --border-hi:      rgba(99,102,241,0.35);

      --text-0:         #f1f5f9;
      --text-1:         #cbd5e1;
      --text-2:         #94a3b8;
      --text-3:         #64748b;
      --text-4:         #3d4f6a;

      --success:        #10b981;
      --success-dim:    rgba(16,185,129,0.12);
      --warning:        #f59e0b;
      --warning-dim:    rgba(245,158,11,0.12);
      --danger:         #f87171;
      --danger-dim:     rgba(248,113,113,0.12);

      --radius-xs:      4px;
      --radius-sm:      8px;
      --radius-md:      12px;
      --radius-lg:      16px;
      --radius-xl:      20px;
      --radius-2xl:     28px;

      --font:           'Inter', system-ui, sans-serif;
      --font-mono:      'JetBrains Mono', 'Fira Code', monospace;
      --ease:           cubic-bezier(0.4, 0, 0.2, 1);
      --t:              0.18s;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg-0);
      color: var(--text-0);
      display: flex;
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient background ── */
    .bg-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-ambient::before {
      content: '';
      position: absolute;
      width: 900px; height: 600px;
      top: -200px; left: -200px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.055) 0%, transparent 65%);
      animation: drift1 22s ease-in-out infinite alternate;
    }
    .bg-ambient::after {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      bottom: -200px; right: -100px;
      background: radial-gradient(ellipse, rgba(56,189,248,0.04) 0%, transparent 60%);
      animation: drift2 28s ease-in-out infinite alternate;
    }
    @keyframes drift1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.08); } }
    @keyframes drift2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-50px, -30px) scale(1.05); } }

    /* Subtle grid */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: rgba(7,10,20,0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 20px 14px;
      gap: 8px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 18px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .logo-mark svg { width: 18px; height: 18px; fill: #fff; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-text strong { font-size: 0.85rem; font-weight: 600; color: var(--text-0); letter-spacing: -0.01em; }
    .logo-text span   { font-size: 0.68rem; color: var(--text-3); margin-top: 1px; }

    .sidebar-label {
      font-size: 0.63rem;
      font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 10px 2px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background var(--t) var(--ease), color var(--t) var(--ease);
    }
    .sidebar-btn:hover { background: var(--bg-4); color: var(--text-0); }
    .sidebar-btn svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
    .sidebar-btn:hover svg { opacity: 1; }

    .sidebar-btn.danger:hover { background: var(--danger-dim); color: var(--danger); }

    .sidebar-spacer { flex: 1; }

    .sidebar-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg-3);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-3);
    }
    .status-indicator {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
      animation: pulse-dot 2.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--success); }
      50% { opacity: 0.7; box-shadow: 0 0 12px var(--success); }
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
    }

    /* ── Topbar ── */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(4,5,13,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-1);
    }
    .topbar-badge {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--border-md);
      border-radius: 20px;
      padding: 2px 8px;
      letter-spacing: 0.02em;
    }

    .mode-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 6px;
    }
    .mode-pill select {
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 0.75rem;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      padding: 0 4px;
    }
    .mode-pill svg { width: 13px; height: 13px; color: var(--text-3); flex-shrink: 0; }

    /* ── Chat ── */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      scroll-behavior: smooth;
    }
    .chat-scroll::-webkit-scrollbar { width: 3px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: var(--bg-5); border-radius: 2px; }
    .chat-scroll { scrollbar-width: thin; scrollbar-color: var(--bg-5) transparent; }

    .chat-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 20px;
      text-align: center;
      padding: 40px 20px;
    }
    .empty-hero {
      position: relative;
      width: 80px; height: 80px;
      margin-bottom: 4px;
    }
    .empty-hero-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid var(--border-md);
      animation: spin-slow 12s linear infinite;
    }
    .empty-hero-ring::before {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      top: -4px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .empty-hero-inner {
      width: 80px; height: 80px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(167,139,250,0.12));
      border: 1px solid var(--border-md);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(99,102,241,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .empty-hero-inner svg { width: 36px; height: 36px; opacity: 0.75; }

    .empty-state h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }
    .empty-state p {
      font-size: 0.85rem;
      color: var(--text-3);
      max-width: 320px;
      line-height: 1.65;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
      max-width: 500px;
    }
    .chip {
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 0.77rem;
      font-family: var(--font);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }
    .chip:hover {
      background: var(--accent-soft);
      border-color: var(--border-hi);
      color: var(--text-0);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-dim);
    }

    /* ── Messages ── */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 24px;
      animation: msg-in 0.22s var(--ease);
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }
    .msg-row.user  { justify-content: flex-end; }
    .msg-row.ai    { justify-content: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .avatar.ai-av {
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .avatar.ai-av svg { width: 14px; height: 14px; fill: #fff; }
    .avatar.user-av {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      box-shadow: 0 0 14px rgba(99,102,241,0.35);
    }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      line-height: 1.7;
      font-size: 0.875rem;
      word-break: break-word;
      position: relative;
    }

    .bubble.user {
      background: linear-gradient(135deg, #4338ca 0%, #3730a3 100%);
      color: #e0e7ff;
      border-radius: var(--radius-xl) var(--radius-xl) var(--radius-xs) var(--radius-xl);
      border: 1px solid rgba(99,102,241,0.4);
      box-shadow: 0 4px 16px rgba(67,56,202,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .bubble.ai {
      background: var(--bg-2);
      color: var(--text-1);
      border-radius: var(--radius-xl) var(--radius-xl) var(--radius-xl) var(--radius-xs);
      border: 1px solid var(--border-md);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .bubble.ai pre {
      background: var(--bg-0);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      overflow-x: auto;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      margin: 10px 0;
      line-height: 1.6;
    }
    .bubble.ai code {
      background: rgba(99,102,241,0.12);
      color: var(--accent2);
      padding: 1px 5px;
      border-radius: var(--radius-xs);
      font-size: 0.83em;
      font-family: var(--font-mono);
    }
    .bubble.ai pre code { background: none; color: inherit; padding: 0; }
    .bubble.ai strong { color: #c7d2fe; font-weight: 600; }
    .bubble.ai em { color: var(--text-2); font-style: italic; }
    .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
      color: var(--text-0);
      font-weight: 600;
      margin: 14px 0 6px;
      letter-spacing: -0.01em;
    }
    .bubble.ai ul, .bubble.ai ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .bubble.ai li { margin: 3px 0; }

    .bubble.error {
      background: var(--danger-dim);
      border-color: rgba(248,113,113,0.25);
      color: #fca5a5;
    }

    /* ── Transcription badge ── */
    .tx-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: var(--text-3);
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 6px;
    }
    .tx-badge svg { width: 10px; height: 10px; }

    /* ── Sources ── */
    .sources {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .sources-hd {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.67rem;
      font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
    }
    .sources-hd svg { width: 11px; height: 11px; }

    .source-item {
      background: rgba(99,102,241,0.05);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: var(--radius-md);
      padding: 9px 12px;
      transition: border-color var(--t) var(--ease), background var(--t) var(--ease);
    }
    .source-item:hover {
      background: rgba(99,102,241,0.08);
      border-color: rgba(99,102,241,0.2);
    }
    .source-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .source-num {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: var(--font-mono);
    }
    .source-name {
      font-size: 0.77rem;
      font-weight: 500;
      color: var(--text-1);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .source-page {
      font-size: 0.66rem;
      color: var(--text-4);
    }
    .source-excerpt {
      font-size: 0.75rem;
      color: var(--text-3);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Audio player ── */
    .audio-wrap {
      margin-top: 10px;
      background: var(--success-dim);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .audio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .audio-label svg { width: 11px; height: 11px; }
    .audio-text {
      font-size: 0.77rem;
      color: var(--text-3);
      line-height: 1.5;
    }
    .audio-wrap audio {
      width: 100%;
      height: 30px;
      opacity: 0.85;
      border-radius: 4px;
    }

    /* ── Typing ── */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 24px;
      animation: msg-in 0.22s var(--ease);
    }
    .typing-bubble {
      background: var(--bg-2);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-xl) var(--radius-xl) var(--radius-xl) var(--radius-xs);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: blink 1.4s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* ── Files preview ── */
    .files-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 16px 0;
    }
    .file-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.72rem;
      color: var(--text-2);
      transition: border-color var(--t) var(--ease);
    }
    .file-tag:hover { border-color: var(--border-md); }
    .file-tag svg { width: 11px; height: 11px; color: var(--accent); flex-shrink: 0; }
    .file-rm {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-4);
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      margin-left: 2px;
      transition: color var(--t) var(--ease);
    }
    .file-rm:hover { color: var(--danger); }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      padding: 0 20px 20px;
    }

    .input-shell {
      max-width: 760px;
      margin: 0 auto;
    }

    .input-card {
      background: var(--bg-2);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-xl);
      transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
      overflow: hidden;
    }
    .input-card:focus-within {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px var(--accent-dim), 0 8px 24px rgba(0,0,0,0.3);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 14px 10px;
    }

    #question-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-0);
      font-family: var(--font);
      font-size: 0.9rem;
      resize: none;
      max-height: 120px;
      min-height: 22px;
      line-height: 1.55;
      padding: 2px 0;
    }
    #question-input::placeholder { color: var(--text-4); }

    .iBtn {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: none;
      border: 1px solid var(--border);
      color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--t) var(--ease);
      flex-shrink: 0;
    }
    .iBtn:hover { background: var(--bg-4); border-color: var(--border-md); color: var(--text-1); }
    .iBtn svg { width: 15px; height: 15px; }
    .iBtn.recording {
      background: var(--danger-dim);
      border-color: rgba(248,113,113,0.3);
      color: var(--danger);
    }
    .iBtn.recording svg { animation: rec-pulse 0.9s ease-in-out infinite; }
    @keyframes rec-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

    .send-btn {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border: none;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--t) var(--ease);
      flex-shrink: 0;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .send-btn:active:not(:disabled) { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; }

    .input-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 14px 10px;
    }
    .tbar-btn {
      display: flex; align-items: center; gap: 5px;
      background: none;
      border: 1px solid transparent;
      border-radius: 20px;
      color: var(--text-3);
      font-family: var(--font);
      font-size: 0.72rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }
    .tbar-btn:hover {
      border-color: var(--border);
      color: var(--text-1);
      background: var(--bg-3);
    }
    .tbar-btn svg { width: 11px; height: 11px; }

    .tbar-hint {
      margin-left: auto;
      font-size: 0.66rem;
      color: var(--text-4);
    }

    /* ── Drag overlay ── */
    .drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4,5,13,0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .drag-overlay.active { display: flex; }
    .drag-box {
      width: 220px; height: 220px;
      border: 2px dashed var(--border-hi);
      border-radius: var(--radius-2xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--accent);
      background: var(--accent-soft);
      animation: drop-bounce 0.6s var(--ease);
    }
    @keyframes drop-bounce { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .drag-box svg { width: 44px; height: 44px; opacity: 0.7; }
    .drag-box span { font-size: 0.85rem; font-weight: 500; text-align: center; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--bg-3);
      border: 1px solid var(--border-md);
      color: var(--text-1);
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
      transform: translateY(8px);
      backdrop-filter: blur(12px);
      max-width: 380px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success-dim); border-color: rgba(16,185,129,0.25); color: #6ee7b7; }
    .toast.error   { background: var(--danger-dim);  border-color: rgba(248,113,113,0.25); color: #fca5a5; }

    /* ── Hidden ── */
    #file-input { display: none; }

    /* ── Scrollbar for chat on Firefox ── */
    .chat-scroll { scrollbar-width: thin; scrollbar-color: var(--bg-5) transparent; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .bubble { max-width: 85%; }
      .chat-scroll { padding: 20px 14px; }
      .input-area { padding: 0 12px 16px; }
      .topbar { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="bg-grid"></div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18c0-.55-.45-1-1-1s-1 .45-1 1v1.93C7.06 19.44 4.56 16.94 4.07 13H6c.55 0 1-.45 1-1s-.45-1-1-1H4.07C4.56 7.06 7.06 4.56 11 4.07V6c0 .55.45 1 1 1s1-.45 1-1V4.07C16.94 4.56 19.44 7.06 19.93 11H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93c-.49 3.94-2.99 6.44-6.93 6.93z"/>
        </svg>
      </div>
      <div class="logo-text">
        <strong>ILCS</strong>
        <span>Assistant IA</span>
      </div>
    </div>

    <span class="sidebar-label">Actions</span>

    <button class="sidebar-btn" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
      Joindre un PDF
    </button>

    <button class="sidebar-btn" id="sb-mic-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
      Message vocal
    </button>

    <div class="sidebar-spacer"></div>

    <span class="sidebar-label">Session</span>

    <button class="sidebar-btn danger" id="sb-clear-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Effacer la session
    </button>

    <div class="sidebar-status">
      <div class="status-indicator"></div>
      Connecté · Groq API
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Nouvelle conversation</span>
        <span class="topbar-badge">RAG · STT · TTS</span>
      </div>
      <div class="mode-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <select id="mode-select" title="Mode de réponse">
          <option value="text">Texte</option>
          <option value="both">Texte + Audio</option>
          <option value="audio">Audio seul</option>
        </select>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-inner" id="chat-inner">

        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
          <div class="empty-hero">
            <div class="empty-hero-ring"></div>
            <div class="empty-hero-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
          </div>
          <h2>Comment puis-je vous aider ?</h2>
          <p>Posez une question, partagez un PDF ou envoyez un message vocal.</p>
          <div class="suggestions">
            <button class="chip" onclick="useSuggestion('Qui sont les étudiants en ILCS ?')">Étudiants ILCS</button>
            <button class="chip" onclick="useSuggestion('Quelles sont les notes disponibles ?')">Notes disponibles</button>
            <button class="chip" onclick="useSuggestion('Résume le document uploadé')">Résume le document</button>
            <button class="chip" onclick="useSuggestion('Bonjour, que peux-tu faire ?')">Tes capacités</button>
          </div>
        </div>

        <!-- Messages injected here -->
        <div id="messages"></div>

      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-shell">
        <div id="files-preview" class="files-preview" style="display:none"></div>
        <div class="input-card">
          <div class="input-row">
            <textarea
              id="question-input"
              placeholder="Posez votre question…"
              rows="1"
              autocomplete="off"
            ></textarea>
            <button class="iBtn" id="mic-btn" title="Message vocal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8"  y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <button class="send-btn" id="send-btn" disabled title="Envoyer (Entrée)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <div class="input-toolbar">
            <button class="tbar-btn" onclick="document.getElementById('file-input').click()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
              Joindre PDF
            </button>
            <button class="tbar-btn" id="clear-chat-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
              Effacer
            </button>
            <span class="tbar-hint">Shift+Entrée pour saut de ligne</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Drag overlay -->
<div class="drag-overlay" id="drag-overlay">
  <div class="drag-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span>Déposez vos fichiers PDF ici</span>
  </div>
</div>

<!-- Toasts -->
<div class="toast-wrap">
  <div class="toast" id="toast"></div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".pdf,text/plain" multiple />

<script>
  /* ── State ── */
  let sessionId    = null;
  let pendingFiles = [];
  let mediaRecorder  = null;
  let audioChunks    = [];
  let isRecording    = false;
  let recordedBlob   = null;
  let isSending      = false;
  let toastTimer     = null;

  /* ── Elements ── */
  const chatScroll    = document.getElementById('chat-scroll');
  const messages      = document.getElementById('messages');
  const emptyState    = document.getElementById('empty-state');
  const questionInput = document.getElementById('question-input');
  const sendBtn       = document.getElementById('send-btn');
  const micBtn        = document.getElementById('mic-btn');
  const sbMicBtn      = document.getElementById('sb-mic-btn');
  const fileInput     = document.getElementById('file-input');
  const filesPreview  = document.getElementById('files-preview');
  const modeSelect    = document.getElementById('mode-select');
  const dragOverlay   = document.getElementById('drag-overlay');
  const toast         = document.getElementById('toast');
  const clearChatBtn  = document.getElementById('clear-chat-btn');
  const sbClearBtn    = document.getElementById('sb-clear-btn');

  /* ── Textarea auto-resize ── */
  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
    updateSendBtn();
  });
  questionInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); trySend(); }
  });
  sendBtn.addEventListener('click', trySend);

  function updateSendBtn() {
    sendBtn.disabled = isSending || (
      !questionInput.value.trim() && pendingFiles.length === 0 && !recordedBlob
    );
  }

  /* ── Files ── */
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(list) {
    const valid = list.filter(f => f.type === 'application/pdf' || f.type === 'text/plain' || f.name.endsWith('.txt'));
    if (valid.length !== list.length) showToast('Seuls les fichiers PDF et .txt sont acceptés.', 'error');
    valid.forEach(f => {
      if (!pendingFiles.find(x => x.name === f.name && x.size === f.size)) pendingFiles.push(f);
    });
    renderFilesPreview();
    updateSendBtn();
  }

  function renderFilesPreview() {
    if (!pendingFiles.length) { filesPreview.style.display = 'none'; return; }
    filesPreview.style.display = 'flex';
    filesPreview.innerHTML = pendingFiles.map((f, i) => `
      <div class="file-tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        ${escHtml(f.name)}
        <button class="file-rm" onclick="removeFile(${i})">×</button>
      </div>`).join('');
  }

  function removeFile(idx) {
    pendingFiles.splice(idx, 1);
    renderFilesPreview();
    updateSendBtn();
  }

  /* ── Drag & drop ── */
  let dragN = 0;
  document.addEventListener('dragenter',  e => { e.preventDefault(); dragN++; dragOverlay.classList.add('active'); });
  document.addEventListener('dragleave',  () => { if (--dragN <= 0) { dragN = 0; dragOverlay.classList.remove('active'); } });
  document.addEventListener('dragover',   e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragN = 0; dragOverlay.classList.remove('active');
    addFiles([...e.dataTransfer.files]);
  });

  /* ── Recording ── */
  micBtn.addEventListener('click',   toggleRecording);
  sbMicBtn.addEventListener('click', toggleRecording);

  async function toggleRecording() {
    if (isRecording) { stopRecording(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks   = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
        stream.getTracks().forEach(t => t.stop());
        micBtn.classList.remove('recording');
        isRecording = false;
        showToast('Audio enregistré — cliquez Envoyer pour transcrire.', 'success');
        updateSendBtn();
      };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      updateSendBtn();
    } catch (e) {
      showToast('Microphone inaccessible : ' + e.message, 'error');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  /* ── Toast ── */
  function showToast(msg, type = 'error') {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3800);
  }

  /* ── Clear ── */
  function clearChat() {
    messages.innerHTML = '';
    emptyState.style.display = '';
    sessionId    = null;
    pendingFiles = [];
    recordedBlob = null;
    renderFilesPreview();
    updateSendBtn();
  }
  clearChatBtn.addEventListener('click', clearChat);
  sbClearBtn.addEventListener('click',  clearChat);

  /* ── Suggestions ── */
  function useSuggestion(text) {
    questionInput.value = text;
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
    updateSendBtn();
    questionInput.focus();
  }

  /* ── Send ── */
  async function trySend() {
    if (isSending) return;
    const text = questionInput.value.trim();
    if (!text && !pendingFiles.length && !recordedBlob) return;

    isSending = true;
    sendBtn.disabled = true;
    emptyState.style.display = 'none';

    const filesSnap = [...pendingFiles];
    const audioSnap = recordedBlob;
    const mode      = modeSelect.value;

    if (text || filesSnap.length) appendUserMsg(text, filesSnap);

    questionInput.value = '';
    questionInput.style.height = 'auto';
    pendingFiles = [];
    recordedBlob = null;
    renderFilesPreview();

    const tid = appendTyping();

    try {
      const form = new FormData();
      if (sessionId) form.append('sessionId', sessionId);
      form.append('responseMode', mode);
      if (text)      form.append('question', text);
      if (audioSnap) form.append('audio', audioSnap, 'recording.webm');
      filesSnap.forEach(f => form.append('files', f, f.name));

      const res = await fetch('/api/chat', { method: 'POST', body: form });
      removeTyping(tid);

      if (!res.ok) {
        let errMsg = `Erreur ${res.status}`;
        try {
          const body = await res.json();
          errMsg = body.message || body.detail || errMsg;
          if (res.status === 429) {
            const ra = res.headers.get('Retry-After');
            errMsg += ra ? ` Réessayez dans ${ra}s.` : ' Réessayez dans quelques instants.';
          }
        } catch { /* ignore */ }
        appendAiError(errMsg);
        showToast(errMsg, 'error');
        return;
      }

      const ct = res.headers.get('content-type') || '';
      if (ct.includes('audio/')) {
        const blob = await res.blob();
        sessionId = res.headers.get('X-Session-Id') || sessionId;
        appendAiAudioOnly(blob, ct);
      } else {
        const data = await res.json();
        sessionId = data.sessionId || res.headers.get('X-Session-Id') || sessionId;
        appendAiMsg(data);
      }
    } catch (e) {
      removeTyping(tid);
      appendAiError('Impossible de joindre le serveur. Vérifiez votre connexion.');
      showToast('Erreur réseau : ' + e.message, 'error');
    } finally {
      isSending = false;
      updateSendBtn();
      scrollBottom();
    }
  }

  /* ── Append helpers ── */
  function appendUserMsg(text, files) {
    const g = document.createElement('div');
    g.className = 'msg-group';
    g.innerHTML = `
      <div class="msg-row user">
        <div class="bubble user">${text ? escHtml(text) : ''}${files.length ? renderFilesList(files) : ''}</div>
        <div class="avatar user-av">W</div>
      </div>`;
    messages.appendChild(g);
    scrollBottom();
  }

  function renderFilesList(files) {
    return `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;">
      ${files.map(f => `<span style="background:rgba(255,255,255,0.1);border-radius:10px;padding:2px 9px;font-size:0.7rem;color:#c7d2fe;">📄 ${escHtml(f.name)}</span>`).join('')}
    </div>`;
  }

  let typingN = 0;
  function appendTyping() {
    const id = 'ty-' + (++typingN);
    const el = document.createElement('div');
    el.className = 'typing-row';
    el.id = id;
    el.innerHTML = `
      <div class="avatar ai-av">
        <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18c0-.55-.45-1-1-1s-1 .45-1 1v1.93C7.06 19.44 4.56 16.94 4.07 13H6c.55 0 1-.45 1-1s-.45-1-1-1H4.07C4.56 7.06 7.06 4.56 11 4.07V6c0 .55.45 1 1 1s1-.45 1-1V4.07C16.94 4.56 19.44 7.06 19.93 11H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93c-.49 3.94-2.99 6.44-6.93 6.93z"/></svg>
      </div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messages.appendChild(el);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function appendAiMsg(data) {
    const g = document.createElement('div');
    g.className = 'msg-group';

    const txHtml = data.transcription ? `
      <div style="display:flex;justify-content:flex-start;margin-bottom:6px;">
        <span class="tx-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          ${escHtml(data.transcription)}
        </span>
      </div>` : '';

    g.innerHTML = `
      ${txHtml}
      <div class="msg-row ai">
        <div class="avatar ai-av">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18c0-.55-.45-1-1-1s-1 .45-1 1v1.93C7.06 19.44 4.56 16.94 4.07 13H6c.55 0 1-.45 1-1s-.45-1-1-1H4.07C4.56 7.06 7.06 4.56 11 4.07V6c0 .55.45 1 1 1s1-.45 1-1V4.07C16.94 4.56 19.44 7.06 19.93 11H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93c-.49 3.94-2.99 6.44-6.93 6.93z"/></svg>
        </div>
        <div class="bubble ai">
          ${formatAnswer(data.answer || '')}
          ${renderSources(data.sources)}
          ${renderAudio(data.audio, data.audioError)}
        </div>
      </div>`;
    messages.appendChild(g);
    scrollBottom();
  }

  function appendAiAudioOnly(blob, mimeType) {
    const url = URL.createObjectURL(blob);
    const g   = document.createElement('div');
    g.className = 'msg-group';
    g.innerHTML = `
      <div class="msg-row ai">
        <div class="avatar ai-av">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18c0-.55-.45-1-1-1s-1 .45-1 1v1.93C7.06 19.44 4.56 16.94 4.07 13H6c.55 0 1-.45 1-1s-.45-1-1-1H4.07C4.56 7.06 7.06 4.56 11 4.07V6c0 .55.45 1 1 1s1-.45 1-1V4.07C16.94 4.56 19.44 7.06 19.93 11H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93c-.49 3.94-2.99 6.44-6.93 6.93z"/></svg>
        </div>
        <div class="bubble ai">
          <div class="audio-wrap">
            <div class="audio-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              Réponse audio
            </div>
            <audio controls src="${url}"></audio>
          </div>
        </div>
      </div>`;
    messages.appendChild(g);
    scrollBottom();
  }

  function appendAiError(msg) {
    const g = document.createElement('div');
    g.className = 'msg-group';
    g.innerHTML = `
      <div class="msg-row ai">
        <div class="avatar ai-av">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18c0-.55-.45-1-1-1s-1 .45-1 1v1.93C7.06 19.44 4.56 16.94 4.07 13H6c.55 0 1-.45 1-1s-.45-1-1-1H4.07C4.56 7.06 7.06 4.56 11 4.07V6c0 .55.45 1 1 1s1-.45 1-1V4.07C16.94 4.56 19.44 7.06 19.93 11H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93c-.49 3.94-2.99 6.44-6.93 6.93z"/></svg>
        </div>
        <div class="bubble ai error">${escHtml(msg)}</div>
      </div>`;
    messages.appendChild(g);
    scrollBottom();
  }

  /* ── Render helpers ── */
  function renderSources(sources) {
    if (!sources || !sources.length) return '';
    return `
      <div class="sources">
        <div class="sources-hd">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Sources
        </div>
        ${sources.map((s, i) => `
          <div class="source-item">
            <div class="source-head">
              <span class="source-num">[${i + 1}]</span>
              <span class="source-name">${escHtml(s.fileName || s.source || 'Document')}</span>
              ${s.pageNumber ? `<span class="source-page">p.${s.pageNumber}</span>` : ''}
            </div>
            <div class="source-excerpt">${escHtml(s.chunk || s.text || '')}</div>
          </div>`).join('')}
      </div>`;
  }

  function renderAudio(audio, audioError) {
    if (audioError) {
      return `<div style="margin-top:10px;font-size:0.75rem;color:var(--warning);display:flex;align-items:center;gap:5px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        ${escHtml(audioError)}
      </div>`;
    }
    if (!audio || !audio.data) return '';
    const src = `data:${audio.mimeType || 'audio/wav'};base64,${audio.data}`;
    return `
      <div class="audio-wrap">
        <div class="audio-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          Réponse audio
        </div>
        ${audio.text ? `<div class="audio-text">${escHtml(audio.text)}</div>` : ''}
        <audio controls src="${src}"></audio>
      </div>`;
  }

  function formatAnswer(text) {
    let h = escHtml(text);
    h = h.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    h = h.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
    h = h.replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>');
    h = h.replace(/^#{1}\s+(.+)$/gm, '<h1>$1</h1>');
    h = h.replace(/\n/g, '<br>');
    return h;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function scrollBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  /* ── Init ── */
  updateSendBtn();
</script>
</body>
</html>
